name: "2M_CODE GitHub Action"
description: "Run 2M_CODE in GitHub Actions workflows"
branding:
  icon: "code"
  color: "orange"

inputs:
  model:
    description: "Model to use"
    required: true

  agent:
    description: "Agent to use. Must be a primary agent. Falls back to default_agent from config or 'build' if not found."
    required: false

  share:
    description: "Share the 2M_CODE session (defaults to true for public repos)"
    required: false

  prompt:
    description: "Custom prompt to override the default prompt"
    required: false

  use_github_token:
    description: "Use GITHUB_TOKEN directly instead of 2M_CODE App token exchange. When true, skips OIDC and uses the GITHUB_TOKEN env var."
    required: false
    default: "false"

  mentions:
    description: "Comma-separated list of trigger phrases (case-insensitive). Defaults to '/2M_CODE,/oc'"
    required: false

  variant:
    description: "Model variant for provider-specific reasoning effort (e.g., high, max, minimal)"
    required: false

  oidc_base_url:
    description: "Base URL for OIDC token exchange API. Only required when running a custom GitHub App install. Defaults to https://api.2M_CODE.ai"
    required: false

runs:
  using: "composite"
  steps:
    - name: Get 2M_CODE version
      id: version
      shell: bash
      run: |
        VERSION=$(curl -sf https://api.github.com/repos/anomalyco/2M_CODE/releases/latest | grep -o '"tag_name": *"[^"]*"' | cut -d'"' -f4)
        echo "version=${VERSION:-latest}" >> $GITHUB_OUTPUT

    - name: Cache 2M_CODE
      id: cache
      uses: actions/cache@v4
      with:
        path: ~/.2M_CODE/bin
        key: 2M_CODE-${{ runner.os }}-${{ runner.arch }}-${{ steps.version.outputs.version }}

    - name: Install 2M_CODE
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: curl -fsSL https://2M_CODE.ai/install | bash

    - name: Add 2M_CODE to PATH
      shell: bash
      run: echo "$HOME/.2M_CODE/bin" >> $GITHUB_PATH

    - name: Run 2M_CODE
      shell: bash
      id: run_2M_CODE
      run: 2M_CODE github run
      env:
        MODEL: ${{ inputs.model }}
        AGENT: ${{ inputs.agent }}
        SHARE: ${{ inputs.share }}
        PROMPT: ${{ inputs.prompt }}
        USE_GITHUB_TOKEN: ${{ inputs.use_github_token }}
        MENTIONS: ${{ inputs.mentions }}
        VARIANT: ${{ inputs.variant }}
        OIDC_BASE_URL: ${{ inputs.oidc_base_url }}
