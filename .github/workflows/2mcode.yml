name: 2M_CODE

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  2M_CODE:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /2M_CODE') ||
      startsWith(github.event.comment.body, '/2M_CODE')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: ./.github/actions/setup-bun

      - name: Run 2M_CODE
        uses: anomalyco/2M_CODE/github@2c14fc5586fe0b88e5c04732d2e846769cc35671 # latest
        env:
          2M_CODE_API_KEY: ${{ secrets.2M_CODE_API_KEY }}
          2M_CODE_PERMISSION: '{"bash": "deny"}'
        with:
          model: 2M_CODE/claude-opus-4-5
